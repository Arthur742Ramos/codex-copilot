name: fork-release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without prefix, for example 0.1.0
        required: true
        type: string
      target:
        description: Target platform to build
        required: true
        default: aarch64-apple-darwin
        type: choice
        options:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
          - x86_64-unknown-linux-gnu
          - all
      make_latest:
        description: Mark the GitHub release as latest
        required: true
        default: false
        type: boolean

concurrency:
  group: fork-release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Validate release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          version="${{ inputs.version }}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?$ ]]; then
            echo "version must look like 0.1.0 or 0.1.0-beta.1" >&2
            exit 1
          fi

          echo "release_tag=copilot-v${version}" >> "$GITHUB_OUTPUT"
          echo "release_name=codex-copilot ${version}" >> "$GITHUB_OUTPUT"

      - name: Build matrix
        id: matrix
        shell: bash
        run: |
          set -euo pipefail

          case "${{ inputs.target }}" in
            aarch64-apple-darwin)
              json='[{"runner":"macos-14","target":"aarch64-apple-darwin"}]'
              ;;
            x86_64-apple-darwin)
              json='[{"runner":"macos-13","target":"x86_64-apple-darwin"}]'
              ;;
            x86_64-unknown-linux-gnu)
              json='[{"runner":"ubuntu-24.04","target":"x86_64-unknown-linux-gnu"}]'
              ;;
            all)
              json='[{"runner":"macos-14","target":"aarch64-apple-darwin"},{"runner":"macos-13","target":"x86_64-apple-darwin"},{"runner":"ubuntu-24.04","target":"x86_64-unknown-linux-gnu"}]'
              ;;
            *)
              echo "unsupported target: ${{ inputs.target }}" >&2
              exit 1
              ;;
          esac

          echo "matrix=${json}" >> "$GITHUB_OUTPUT"

  build:
    name: Build - ${{ matrix.target }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}
    defaults:
      run:
        working-directory: codex-rs
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_RELEASE_LTO: thin
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux build dependencies
        if: ${{ runner.os == 'Linux' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends pkg-config libcap-dev

      - uses: dtolnay/rust-toolchain@1.93.0
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        shell: bash
        run: cargo build --locked --release --target ${{ matrix.target }} --bin codex

      - name: Package release asset
        shell: bash
        run: |
          set -euo pipefail

          dest="${RUNNER_TEMP}/dist/${{ matrix.target }}"
          mkdir -p "$dest"

          cp "target/${{ matrix.target }}/release/codex" "$dest/codex"
          tar -C "$dest" -czf "$dest/codex-${{ matrix.target }}.tar.gz" codex
          shasum -a 256 "$dest/codex-${{ matrix.target }}.tar.gz" > "$dest/codex-${{ matrix.target }}.sha256"
          rm "$dest/codex"

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            ${{ runner.temp }}/dist/${{ matrix.target }}/*

  release:
    name: Publish release
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: ${{ needs.prepare.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          make_latest: ${{ inputs.make_latest && 'true' || 'false' }}
          files: dist/*
