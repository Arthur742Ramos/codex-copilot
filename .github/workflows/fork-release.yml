name: fork-release

on:
  push:
    tags:
      - "copilot-v*"
  workflow_dispatch:
    inputs:
      version:
        description: Release version without prefix, for example 0.1.0
        required: true
        type: string
      target:
        description: Target platform to build
        required: true
        default: all
        type: choice
        options:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - x86_64-pc-windows-msvc
          - all
      make_latest:
        description: Mark the GitHub release as latest
        required: true
        default: true
        type: boolean

concurrency:
  group: fork-release-${{ github.event.inputs.version || github.ref_name || github.sha }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      make_latest: ${{ steps.meta.outputs.make_latest }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      version: ${{ steps.meta.outputs.version }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Validate release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            release_tag="${GITHUB_REF_NAME}"
            if [[ ! "$release_tag" =~ ^copilot-v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?$ ]]; then
              echo "tag must look like copilot-v0.1.0 or copilot-v0.1.0-beta.1" >&2
              exit 1
            fi
            version="${release_tag#copilot-v}"
            make_latest="true"
          else
            version="${{ inputs.version }}"
            if [[ -z "$version" ]]; then
              echo "version is required for workflow_dispatch" >&2
              exit 1
            fi
            release_tag="copilot-v${version}"
            make_latest="${{ inputs.make_latest }}"
            if [[ -z "$make_latest" ]]; then
              make_latest="true"
            fi
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?$ ]]; then
            echo "version must look like 0.1.0 or 0.1.0-beta.1" >&2
            exit 1
          fi

          echo "make_latest=${make_latest}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "release_name=codex-copilot ${version}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Build matrix
        id: matrix
        shell: bash
        run: |
          set -euo pipefail

          target="${{ inputs.target }}"
          if [[ -z "$target" ]]; then
            target="all"
          fi

          case "$target" in
            aarch64-apple-darwin)
              json='[{"runner":"macos-14","target":"aarch64-apple-darwin","ext":""}]'
              ;;
            x86_64-apple-darwin)
              json='[{"runner":"macos-15-intel","target":"x86_64-apple-darwin","ext":""}]'
              ;;
            x86_64-unknown-linux-gnu)
              json='[{"runner":"ubuntu-24.04","target":"x86_64-unknown-linux-gnu","ext":""}]'
              ;;
            aarch64-unknown-linux-gnu)
              json='[{"runner":"ubuntu-24.04","target":"aarch64-unknown-linux-gnu","ext":"","cross":true}]'
              ;;
            x86_64-pc-windows-msvc)
              json='[{"runner":"windows-latest","target":"x86_64-pc-windows-msvc","ext":".exe"}]'
              ;;
            all)
              json='[{"runner":"macos-14","target":"aarch64-apple-darwin","ext":""},{"runner":"macos-15-intel","target":"x86_64-apple-darwin","ext":""},{"runner":"ubuntu-24.04","target":"x86_64-unknown-linux-gnu","ext":""},{"runner":"ubuntu-24.04","target":"aarch64-unknown-linux-gnu","ext":"","cross":true},{"runner":"windows-latest","target":"x86_64-pc-windows-msvc","ext":".exe"}]'
              ;;
            *)
              echo "unsupported target: ${target}" >&2
              exit 1
              ;;
          esac

          echo "matrix=${json}" >> "$GITHUB_OUTPUT"

  build:
    name: Build - ${{ matrix.target }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}
    defaults:
      run:
        working-directory: codex-rs
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_RELEASE_LTO: thin
    steps:
      - uses: actions/checkout@v6

      - name: Stamp version in Cargo.toml
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.prepare.outputs.version }}"
          sed -i.bak "s/^version = \"0\.0\.0\"/version = \"${version}\"/" Cargo.toml
          rm -f Cargo.toml.bak
          echo "Workspace version set to ${version}"
          grep '^version' Cargo.toml

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends pkg-config libcap-dev

      - name: Install cross-compilation toolchain (ARM Linux)
        if: matrix.cross
        shell: bash
        run: |
          set -euo pipefail
          sudo dpkg --add-architecture arm64
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libc6-dev-arm64-cross \
            libcap-dev:arm64 libssl-dev:arm64
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "AR_aarch64_unknown_linux_gnu=aarch64-linux-gnu-ar" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_SYSROOT_DIR=/" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@1.93.0
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        shell: bash
        run: cargo build --release --target ${{ matrix.target }} --bin codex

      - name: Package release asset (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail

          dest="${RUNNER_TEMP}/dist/${{ matrix.target }}"
          mkdir -p "$dest"

          cp "target/${{ matrix.target }}/release/codex" "$dest/codex"
          tar -C "$dest" -czf "$dest/codex-${{ matrix.target }}.tar.gz" codex
          shasum -a 256 "$dest/codex-${{ matrix.target }}.tar.gz" > "$dest/codex-${{ matrix.target }}.sha256"
          rm "$dest/codex"

      - name: Package release asset (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dest = "$env:RUNNER_TEMP\dist\${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null

          Copy-Item "target\${{ matrix.target }}\release\codex.exe" "$dest\codex.exe"
          Compress-Archive -Path "$dest\codex.exe" -DestinationPath "$dest\codex-${{ matrix.target }}.zip"
          $hash = (Get-FileHash "$dest\codex-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  codex-${{ matrix.target }}.zip" | Out-File -Encoding ascii "$dest\codex-${{ matrix.target }}.sha256"
          Remove-Item "$dest\codex.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            ${{ runner.temp }}/dist/${{ matrix.target }}/*

  release:
    name: Publish release
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            scripts/install-copilot-release.sh
            scripts/install-copilot-release.ps1
          sparse-checkout-cone-mode: false

      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Stage install scripts
        shell: bash
        run: |
          cp scripts/install-copilot-release.sh dist/install.sh
          cp scripts/install-copilot-release.ps1 dist/install.ps1

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: ${{ needs.prepare.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          make_latest: ${{ needs.prepare.outputs.make_latest }}
          files: dist/*
          body: |
            ## Install

            **macOS / Linux**
            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ needs.prepare.outputs.release_tag }}/install.sh | bash -s -- ${{ needs.prepare.outputs.release_tag }}
            ```

            **Windows PowerShell (x64)**
            ```powershell
            $tmp = Join-Path $env:TEMP "install-codex-copilot.ps1"
            irm https://github.com/${{ github.repository }}/releases/download/${{ needs.prepare.outputs.release_tag }}/install.ps1 -OutFile $tmp
            & $tmp ${{ needs.prepare.outputs.release_tag }}
            ```

            The installers download the matching release asset directly and put `codex`
            on your `PATH`. If you prefer, you can also download the platform archive
            from the assets below and extract it manually.
